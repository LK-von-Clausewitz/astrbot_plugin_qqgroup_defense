name: astrbot_plugin_group_defense
display_name: QQ 群防御插件
description: 群员通过固定格式举报内鬼，达到阈值后自动踢人
author: LK-von-Clausewitz
version: 1.0.0
repo: https://github.com/LK-von-Clausewitz/astrbot_plugin_qqgroup_defense
support_platforms:
  - aiocqhttp
astrbot_version: ">=4.16,<5"
config_schema:
  threshold:
    type: int
    description: "举报人数阈值"
    default: 2
  reportKeyword:
    type: str
    description: "举报触发关键词"
    default: "有内鬼"
